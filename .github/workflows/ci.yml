name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  test:
    name: Test and Memory Check (${{ matrix.cpu }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cpu: [generic, zen2, zen3]
        gcc_version: ['15']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind gcc make

      - name: Set up GCC ${{ matrix.gcc_version }}
        run: |
          gcc --version

      - name: Build library (${{ matrix.cpu }})
        run: |
          make CPU_TARGET=${{ matrix.cpu }} clean all

      - name: Run tests with valgrind (make test)
        run: |
          make CPU_TARGET=${{ matrix.cpu }} test

  test-arm:
    name: Build ARM bare-metal (${{ matrix.cpu }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cpu: [arm32, arm32-hf]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi make

      - name: Verify toolchain
        run: |
          arm-none-eabi-gcc --version

      - name: Build library (${{ matrix.cpu }})
        run: |
          make CPU_TARGET=${{ matrix.cpu }} clean all

      - name: Verify ARM ELF output
        run: |
          set -e
          for obj in build/${{ matrix.cpu }}/*.o; do
            echo "=== $obj ==="
            arm-none-eabi-readelf -h "$obj" | grep -E "Class|Machine"
            arm-none-eabi-readelf -h "$obj" | grep -q "Machine:.*ARM"
          done
          echo "All objects verified as ARM ELF"

      - name: Check float ABI
        run: |
          # Compile a synthetic float op to confirm -mfloat-abi took effect
          echo 'float f(float a, float b) { return a + b; }' > /tmp/fp.c
          case "${{ matrix.cpu }}" in
            arm32)
              arm-none-eabi-gcc -mcpu=cortex-m4 -mthumb -mfloat-abi=soft \
                -c /tmp/fp.c -o /tmp/fp.o
              if arm-none-eabi-readelf -A /tmp/fp.o | grep -q "Tag_FP_arch"; then
                echo "ERROR: soft-float build has Tag_FP_arch"; exit 1
              fi
              ;;
            arm32-hf)
              arm-none-eabi-gcc -mcpu=cortex-m4 -mthumb \
                -mfpu=fpv4-sp-d16 -mfloat-abi=hard \
                -c /tmp/fp.c -o /tmp/fp.o
              arm-none-eabi-readelf -A /tmp/fp.o | grep -q "Tag_FP_arch: VFPv4-D16"
              arm-none-eabi-readelf -A /tmp/fp.o | grep -q "Tag_ABI_VFP_args: VFP registers"
              ;;
          esac
          echo "Float ABI verified for ${{ matrix.cpu }}"

  build-release:
    name: Build Release Library
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        cpu: [generic, zen2, zen3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc binutils make

      - name: Build release static + shared (${{ matrix.cpu }})
        run: |
          make CPU_TARGET=${{ matrix.cpu }} BUILD_TYPE=release clean static
          make CPU_TARGET=${{ matrix.cpu }} BUILD_TYPE=release shared

      - name: Report artifact size
        run: |
          make CPU_TARGET=${{ matrix.cpu }} BUILD_TYPE=release size

      - name: Stage distribution layout
        run: |
          stage=artifacts/${{ matrix.cpu }}
          mkdir -p $stage/lib $stage/include
          cp build/${{ matrix.cpu }}/libc_lib-${{ matrix.cpu }}-release.a $stage/lib/
          cp -P build/${{ matrix.cpu }}/libc_lib-${{ matrix.cpu }}-release.so* $stage/lib/
          cp include/base.h include/darray.h include/hashmap.h include/list.h \
             include/rbtree.h include/types.h $stage/include/

      - name: Create distribution archive
        run: |
          cd artifacts/${{ matrix.cpu }}
          tar -czf ../../c_lib-${{ matrix.cpu }}-linux.tar.gz .
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: c_lib-${{ matrix.cpu }}-linux
          path: c_lib-${{ matrix.cpu }}-linux.tar.gz

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: |
          ls -la artifacts/

      - name: Create release archive
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cpu=$(basename "$dir")
            cp "$dir"*.tar.gz release/
          done
          tar -czf c_lib-all-platforms.tar.gz release/
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: release/*.tar.gz
          draft: false
          prerelease: false
          tag_name: v${{ github.run_number }}
          release_name: c-lib v${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
